# .github/workflows/build-and-upload.yml
name: 📦 Build APK y subir a Google Drive

on:
  # se ejecuta al hacer push a main, o manualmente desde “Run workflow”
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1) Clonar el repo
    - uses: actions/checkout@v4

    # 2) JDK 21
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    # 3) Caché de Gradle (acelera compilaciones posteriores)
    - uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}-

    # 4) Asegurar permiso de ejecución
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 5) Compilar el APK (Debug)
    - name: Build APK
      run: ./gradlew :app:assembleDebug --build-cache --parallel --daemon

    # 6) Guardar el APK como artefacto (descarga directa en la pestaña “Artifacts”)
    - name: Publish artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ github.run_number }}.apk
        path: app/build/outputs/apk/debug/app-debug.apk

    # 7) Subirlo a Google Drive con nombre único (run_number evita
    #    colisiones y la “papelera fantasma”)
    - name: Upload to Google Drive
      uses: mathisve/gdrive-upload-action@main
      with:
        credentials:  ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY_BASE64 }}
        encoded:      true
        filename:     app/build/outputs/apk/debug/app-debug.apk
        name:         fitlife-${{ github.run_number }}.apk   # ← único
        folderId:     ${{ secrets.GDRIVE_FOLDER_ID }}
        overwrite:    false                                  # ← evita papelera
