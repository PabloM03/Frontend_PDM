name: 📦 Build APK y subir a Google Drive

on:
  push:
    branches: [ main ]           # ajusta si tu rama principal se llama distinto
  workflow_dispatch:             # permite lanzarlo manualmente desde Actions

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1) Clonar el repo
    - name: Checkout
      uses: actions/checkout@v4

    # 2) Configurar JDK 21 (Temurin)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    # 3) Caché de Gradle (acelera builds)
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}-

    # 4) Dar permiso de ejecución al wrapper
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # 5) Compilar APK debug (igual que en Android Studio)
    - name: Build APK (Debug)
      run: ./gradlew :app:assembleDebug --build-cache --parallel --daemon

    # 6) Subir el APK como artefacto descargable (opcional pero útil)
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk

    # 7) Subir APK a Google Drive y compartirlo contigo
    - name: Upload APK to Google Drive
      uses: mathisve/gdrive-upload-action@main
      with:
        # Secret que contiene **TODO** el JSON de la service-account pero codificado en base64
        credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY_BASE64 }}
        encoded:     true                         # el secret está base64-encoded

        # Fichero origen (el que acabamos de compilar)
        filename:    app/build/outputs/apk/debug/app-debug.apk

        # Nombre final → añade el nº de ejecución para no sobrescribir
        name:        fitlife-${{ github.run_number }}.apk

        # Carpeta de destino (solo el ID, sin la URI ni parámetros)
        folderId:    ${{ secrets.GDRIVE_FOLDER_ID }}

        # Si vuelves a usar el mismo nombre exacto, sobreescribe; con run_number
        # suele ser único, pero dejamos esto por si acaso
        overwrite:   true

        # Comparte el archivo con tu usuario para que sea visible
        shareWith:   pamongar03@gmail.com         # cámbialo a tu e-mail real
        role:        writer                       # permisos que obtendrás
