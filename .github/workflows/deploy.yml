name: 📦 Build APK y subir a Google Drive

on:
  push:
    branches: [ main ]          # cambia si tu rama principal tiene otro nombre
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout del repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Configurar JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # 3) Caché de Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 4) Permiso de ejecución para gradlew
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5) Compilar APK debug (como en Android Studio)
      - name: Build APK (Debug)
        run: ./gradlew :app:assembleDebug --build-cache --parallel --daemon

      # 6) Subir APK como artefacto descargable
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 7) Subir APK a Google Drive
      - name: Upload APK to Google Drive
        uses: mathisve/gdrive-upload-action@main
        with:
          credentials:  ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY_BASE64 }}
          encoded:       true                       # porque el secret está en base64
          filename:      app/build/outputs/apk/debug/app-debug.apk
          name:          fitlife-latest.apk         # nombre que se verá en Drive
          folderId:      ${{ secrets.GDRIVE_FOLDER_ID }}
          remove:     true
